<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Playground | Online Exam System</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --editor-bg: #1e1e1e;
            --panel-bg: #252526;
            --border-color: #3e3e42;
            --accent-color: #007acc;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0f172a;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .playground-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            height: calc(100vh - 70px);
            width: 100%;
            box-sizing: border-box;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tool-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        select {
            background: #1e293b;
            color: white;
            border: 1px solid #334155;
            padding: 8px 15px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
            min-height: 0;
            width: 100%;
        }

        #editor-container {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: var(--editor-bg);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            height: 100%;
        }

        .output-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0;
        }

        .panel-box {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea#stdin {
            flex: 1;
            background: #0f172a;
            color: #e2e8f0;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        #stdout {
            flex: 2;
            background: #000;
            color: #4ade80;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #22c55e44;
        }

        .status-bar {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            gap: 20px;
        }

        .btn-run {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-run:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
        }

        .btn-run:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Mobile Adjustments */
        @media (max-width: 1024px) {
            .workspace {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 300px;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">EduPro Playground</div>
        <div class="nav-content">
            <a href="student-dashboard.html" class="nav-link-btn"><span>🏠</span> Dashboard</a>
            <a href="playground.html" class="nav-link-btn active"><span>💻</span> Playground</a>
            <a href="profile.html" class="nav-link-btn"><span>👤</span> Profile</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>


    <div class="playground-main">
        <div class="toolbar">
            <div class="tool-group">
                <select id="language-select">
                    <option value="python">Python 3</option>
                    <option value="javascript">JavaScript (Node.js)</option>
                    <option value="java">Java (OpenJDK 13)</option>
                    <option value="cpp">C++ (GCC 9.2.0)</option>
                    <option value="c">C (GCC 9.2.0)</option>
                </select>
                <button class="btn-clear" id="reset-code">Reset Code</button>
            </div>
            <div class="tool-group">
                <div id="execution-status" style="margin-right: 15px; font-weight: 600;"></div>
                <button class="btn-run" id="run-btn">
                    <span>▶</span> Run Code
                </button>
            </div>
        </div>

        <div class="workspace">
            <div id="editor-container"></div>

            <div class="output-panel">
                <div class="panel-box" style="flex: 1;">
                    <div class="panel-header">Input (stdin)</div>
                    <textarea id="stdin" placeholder="Enter custom input here..."></textarea>
                </div>

                <div class="panel-box" style="flex: 2;">
                    <div class="panel-header">Output (stdout)</div>
                    <div id="stdout">Program output will appear here...</div>
                    <div class="status-bar" id="result-stats">
                        <!-- Stats will appear here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Monaco Editor Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/playground.js"></script>
</body>

</html>
